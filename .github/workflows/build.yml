name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build app + dmg
        env:
          SKIP_NOTARIZE: "1" # no Developer ID, ad-hoc sign only
        run: ./build.sh --dmg

      - name: Zip app
        run: ditto -c -k --keepParent build/ClaudeStatusBar.app build/ClaudeStatusBar.app.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeStatusBar-${{ github.sha }}
          path: |
            build/ClaudeStatusBar.app.zip
            build/ClaudeStatusBar.dmg
          retention-days: 30

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/ClaudeStatusBar.app.zip
            build/ClaudeStatusBar.dmg
